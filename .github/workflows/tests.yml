name: Pruebas

on:
  pull_request:
  push:
    branches:
      - main
      - agent/proveedores-categorias-recepcion

permissions:
  contents: write

jobs:
  format-provider-categories:
    if: github.ref == 'refs/heads/agent/proveedores-categorias-recepcion'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v7
        with:
          ref: agent/proveedores-categorias-recepcion
          fetch-depth: 0
      - name: Preparar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none
      - name: Instalar dependencias
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Aplicar Laravel Pint
        run: vendor/bin/pint
      - name: Restaurar CI y publicar formato
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/tests.yml
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: formatear prueba de categorías de proveedor"
          git push origin HEAD:agent/proveedores-categorias-recepcion

  backend:
    if: github.ref != 'refs/heads/agent/proveedores-categorias-recepcion'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: estiba_wms_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      CACHE_STORE: array
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: estiba_wms_test
      DB_USERNAME: root
      DB_PASSWORD: root
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
    steps:
      - name: Descargar código
        uses: actions/checkout@v7
      - name: Preparar entorno
        run: cp .env.example .env
      - name: Preparar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, zip
          coverage: none
      - name: Preparar Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - name: Instalar dependencias
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Validar archivos de Composer
        run: composer validate --strict --no-check-publish
      - name: Instalar dependencias frontend
        run: npm ci
      - name: Compilar interfaz tablet
        run: npm run build
      - name: Validar estilo
        run: vendor/bin/pint --test
      - name: Crear esquema limpio
        run: php artisan migrate:fresh --force
      - name: Ejecutar pruebas
        run: php artisan test --fail-on-warning

  mobile:
    if: github.ref != 'refs/heads/agent/proveedores-categorias-recepcion'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Descargar código
        uses: actions/checkout@v7
      - name: Preparar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Instalar dependencias móviles
        run: npm ci
      - name: Validar TypeScript
        run: npm run typecheck
      - name: Validar bundle Android
        run: npm run export:android
