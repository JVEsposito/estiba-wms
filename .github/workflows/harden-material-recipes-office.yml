name: Endurecer integración de recetas

on:
  push:
    branches:
      - agent/oficina-materiales-recetas
    paths:
      - .github/workflows/harden-material-recipes-office.yml

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/oficina-materiales-recetas
          fetch-depth: 0

      - name: Aplicar correcciones de estado y permisos
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('resources/js/office-material-recipes.js')
          content = path.read_text()

          replacements = [
              (
                  "    loadedToken: null,\n};",
                  "    loadedToken: null,\n    loading: false,\n};",
              ),
              (
                  "function recipeStatus(value) {\n    return String(value || '').replaceAll('_', ' ').replace(/^./, (letter) => letter.toUpperCase());\n}\n",
                  "function recipeStatus(value) {\n    return String(value || '').replaceAll('_', ' ').replace(/^./, (letter) => letter.toUpperCase());\n}\n\nfunction canConsultRecipes() {\n    if (recipeState.identity?.puede_consultar_transformaciones_materiales === true) return true;\n    return ['administrador', 'supervisor_materiales', 'camarero_materiales', 'despachador', 'consulta']\n        .includes(recipeState.identity?.rol);\n}\n\nfunction canAdminRecipes() {\n    if (recipeState.identity?.puede_administrar_recetas_materiales === true) return true;\n    return ['administrador', 'supervisor_materiales'].includes(recipeState.identity?.rol);\n}\n",
              ),
              (
                  "    const data = Object.fromEntries(new FormData(recipeElements.form));\n\n    try {",
                  "    const data = Object.fromEntries(new FormData(recipeElements.form));\n    const originalButtonText = recipeElements.save.textContent;\n\n    try {",
              ),
              (
                  "        if (!recipeState.editingRecipeId) recipeElements.save.textContent = 'Crear receta';",
                  "        recipeElements.save.textContent = recipeState.editingRecipeId\n            ? originalButtonText\n            : 'Crear receta';",
              ),
              (
                  "                    ${recipeState.identity?.puede_administrar_recetas_materiales === true ? `<button class=\"secondary-button\" data-new-recipe-version=\"${recipeEscape(recipe.id)}\" type=\"button\">Nueva versión</button>` : ''}",
                  "                    ${canAdminRecipes() && recipe.temporada?.activa === true ? `<button class=\"secondary-button\" data-new-recipe-version=\"${recipeEscape(recipe.id)}\" type=\"button\">Nueva versión</button>` : ''}",
              ),
              (
                  "                    <span>Versión ${recipeEscape(version?.numero_version || '—')}</span>",
                  "                    <span>Versión ${recipeEscape(version?.numero_version || '—')}</span>\n                    <span>Historial: ${(recipe.versiones || []).length} ${(recipe.versiones || []).length === 1 ? 'versión' : 'versiones'}</span>",
              ),
          ]

          for old, new in replacements:
              if old not in content:
                  raise SystemExit(f'No se encontró bloque esperado: {old[:80]!r}')
              content = content.replace(old, new, 1)

          old_load = """async function loadRecipesOffice(showErrors = false) {
    recipeState.token = localStorage.getItem(recipeTokenKey);
    recipeState.identity = recipeReadJson(recipeIdentityKey);
    if (!recipeState.token || recipeState.identity?.puede_consultar_transformaciones_materiales !== true) {
        recipeElements.panel?.classList.add('is-hidden');
        return;
    }

    recipeElements.panel.classList.remove('is-hidden');
    recipeElements.form.classList.toggle('is-hidden', recipeState.identity?.puede_administrar_recetas_materiales !== true);
    try {
        const [catalog, recipes] = await Promise.all([
            recipeApi('/api/materiales/catalogo'),
            recipeApi('/api/materiales/transformaciones/recetas?per_page=100'),
        ]);
        recipeState.catalog = catalog;
        recipeState.recipes = recipes.data || [];
        recipeState.loadedToken = recipeState.token;
        populateRecipeSelectors();
        if (!recipeState.editingRecipeId) resetRecipeComponents();
        renderRecipes();
    } catch (error) {
        if (showErrors) {
            recipeElements.list.innerHTML = `<p class="materials-recipe-empty">${recipeEscape(error.message)}</p>`;
        }
    }
}
"""
          new_load = """async function loadRecipesOffice(showErrors = false) {
    recipeState.token = localStorage.getItem(recipeTokenKey);
    recipeState.identity = recipeReadJson(recipeIdentityKey);
    if (!recipeState.token || !canConsultRecipes()) {
        recipeElements.panel?.classList.add('is-hidden');
        return;
    }
    if (recipeState.loading) return;

    const editingRecipeId = recipeState.editingRecipeId;
    recipeState.loading = true;
    recipeState.loadedToken = recipeState.token;
    recipeElements.panel.classList.remove('is-hidden');
    recipeElements.form.classList.toggle('is-hidden', !canAdminRecipes());
    try {
        const [catalog, recipes] = await Promise.all([
            recipeApi('/api/materiales/catalogo'),
            recipeApi('/api/materiales/transformaciones/recetas?per_page=100'),
        ]);
        recipeState.catalog = catalog;
        recipeState.recipes = recipes.data || [];
        populateRecipeSelectors();
        if (editingRecipeId && canAdminRecipes()) {
            openRecipeVersion(editingRecipeId);
        } else {
            resetRecipeComponents();
        }
        renderRecipes();
    } catch (error) {
        if (showErrors || !recipeState.recipes.length) {
            recipeElements.list.innerHTML = `<p class="materials-recipe-empty">${recipeEscape(error.message)}</p>`;
        }
    } finally {
        recipeState.loading = false;
    }
}
"""
          if old_load not in content:
              raise SystemExit('No se encontró loadRecipesOffice original.')
          content = content.replace(old_load, new_load, 1)

          content = content.replace(
              "        if (token && token !== recipeState.loadedToken) loadRecipesOffice(false);",
              "        if (token && token !== recipeState.loadedToken && !recipeState.loading) loadRecipesOffice(false);",
              1,
          )

          path.write_text(content)
          PY

      - name: Validar JavaScript
        run: node --check resources/js/office-material-recipes.js

      - name: Retirar workflow temporal y publicar
        run: |
          rm .github/workflows/harden-material-recipes-office.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources/js/office-material-recipes.js .github/workflows/harden-material-recipes-office.yml
          git commit -m "fix: robustecer estado de recetas en oficina"
          git push origin HEAD:agent/oficina-materiales-recetas
