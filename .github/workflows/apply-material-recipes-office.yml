name: Aplicar integración de recetas

on:
  push:
    branches:
      - agent/oficina-materiales-recetas
    paths:
      - .github/workflows/apply-material-recipes-office.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/oficina-materiales-recetas
          fetch-depth: 0

      - name: Incorporar recurso en Oficina de Materiales
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('resources/views/office/materials.blade.php')
          content = path.read_text()
          old = "@vite(['resources/css/office.css', 'resources/css/office-materials.css', 'resources/js/office-materials.js'])"
          new = "@vite(['resources/css/office.css', 'resources/css/office-materials.css', 'resources/js/office-materials.js', 'resources/js/office-material-recipes.js'])"
          if old not in content:
              raise SystemExit('No se encontró la declaración Vite esperada.')
          path.write_text(content.replace(old, new, 1))
          PY

      - name: Validar JavaScript
        run: node --check resources/js/office-material-recipes.js

      - name: Retirar workflow temporal y publicar
        run: |
          rm .github/workflows/apply-material-recipes-office.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources/views/office/materials.blade.php .github/workflows/apply-material-recipes-office.yml
          git commit -m "feat: habilitar recetas en oficina de materiales"
          git push origin HEAD:agent/oficina-materiales-recetas
