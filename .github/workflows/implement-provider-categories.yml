            ->where('activo', true)
            ->get(['id', 'cliente_id']);

        foreach ($vinculos as $vinculo) {
            $categorias = DB::table('items_materiales as items')
                ->join('clientes_materiales as catalogos', 'catalogos.id', '=', 'items.cliente_material_id')
                ->where('catalogos.cliente_id', $vinculo->cliente_id)
